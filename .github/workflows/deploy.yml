name: Deploy to vzp.app

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy text files to Cloudflare KV
        env:
          DEPLOY_TOKEN: ${{ secrets.VZP_DEPLOY_TOKEN }}
        run: |
          set -e
          API_URL="https://vzp-deploy.fatih-m-a.workers.dev/api/deploy"
          UA="VZP-Deploy/1.0"
          TOTAL=0
          
          echo "🚀 VZP Deploy"
          
          FILES=$(find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.svg" -o -name "*.md" \) \
            ! -path "./.git/*" ! -path "./.github/*" ! -path "./node_modules/*" | sed 's|^\./||' | sort)
          
          echo "📦 $(echo "$FILES" | wc -l) Text-Dateien"
          
          BATCH=""
          COUNT=0
          
          for f in $FILES; do
            CONTENT=$(python3 -c "import json; print(json.dumps(open('$f','r',errors='replace').read()))")
            [ -n "$BATCH" ] && BATCH="$BATCH,"
            BATCH="$BATCH{\"path\":\"$f\",\"content\":$CONTENT}"
            COUNT=$((COUNT + 1))
            
            if [ $COUNT -ge 10 ]; then
              echo "{\"files\":[$BATCH]}" > /tmp/batch.json
              RESULT=$(curl -s -X POST "$API_URL" -H "Content-Type: application/json" -H "Authorization: Bearer $DEPLOY_TOKEN" -H "User-Agent: $UA" -d @/tmp/batch.json)
              echo "$RESULT" | grep -q '"success":true' && echo "  ✅ Batch $COUNT deployed" || echo "  ❌ $RESULT"
              TOTAL=$((TOTAL + COUNT))
              BATCH=""
              COUNT=0
            fi
          done
          
          if [ $COUNT -gt 0 ]; then
            echo "{\"files\":[$BATCH]}" > /tmp/batch.json
            RESULT=$(curl -s -X POST "$API_URL" -H "Content-Type: application/json" -H "Authorization: Bearer $DEPLOY_TOKEN" -H "User-Agent: $UA" -d @/tmp/batch.json)
            echo "$RESULT" | grep -q '"success":true' && echo "  ✅ Batch $COUNT deployed" || echo "  ❌ $RESULT"
            TOTAL=$((TOTAL + COUNT))
          fi
          
          echo "🎉 $TOTAL Text-Dateien deployed"

      - name: Deploy binary assets (PNG/JPG)
        env:
          DEPLOY_TOKEN: ${{ secrets.VZP_DEPLOY_TOKEN }}
        run: |
          set -e
          API_URL="https://vzp-deploy.fatih-m-a.workers.dev/api/deploy"
          UA="VZP-Deploy/1.0"
          
          BINS=$(find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) \
            ! -path "./.git/*" | sed 's|^\./||' | sort)
          
          BIN_COUNT=$(echo "$BINS" | grep -c . || true)
          [ "$BIN_COUNT" -eq 0 ] && { echo "Keine binären Assets"; exit 0; }
          
          echo "🖼 $BIN_COUNT binäre Assets"
          
          for f in $BINS; do
            MIME="image/png"
            echo "$f" | grep -qiE '\.jpe?g$' && MIME="image/jpeg"
            
            # Write payload via python to avoid "argument list too long"
            python3 -c "
          import json, base64
          with open('$f','rb') as img:
              b64 = base64.b64encode(img.read()).decode()
          payload = {'files':[{'path':'$f','content':f'data:$MIME;base64,{b64}'}]}
          with open('/tmp/bin_deploy.json','w') as out:
              json.dump(payload, out)
          "
            
            RESULT=$(curl -s -X POST "$API_URL" -H "Content-Type: application/json" -H "Authorization: Bearer $DEPLOY_TOKEN" -H "User-Agent: $UA" -d @/tmp/bin_deploy.json)
            echo "$RESULT" | grep -q '"success":true' && echo "  ✅ $f" || echo "  ⚠️ $f"
          done
          
          echo "🎉 Binary deploy done"
