<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52">
  <defs>
    <pattern id="rw-sl" x="0" y="0" width="28" height="22" patternUnits="userSpaceOnUse" patternTransform="skewX(-25)">
      <rect x="0" y="0" width="14" height="22" fill="#d32f2f"/>
      <rect x="14" y="0" width="14" height="22" fill="#ffffff"/>
    </pattern>
    <clipPath id="schl-clip"><rect x="6" y="22" width="208" height="22" rx="2"/></clipPath>
    <radialGradient id="wl-g" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="55%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </radialGradient>
  </defs>
  <!-- Warnleuchten oben (2 Stück, symmetrisch) -->
  <rect x="65" y="14" width="8" height="10" rx="1" fill="#444"/>
  <circle cx="69" cy="9" r="8" fill="url(#wl-g)" stroke="#cc8800" stroke-width="1.2"/>
  <circle cx="69" cy="9" r="4" fill="#fffde7" opacity="0.65"/>

  <rect x="147" y="14" width="8" height="10" rx="1" fill="#444"/>
  <circle cx="151" cy="9" r="8" fill="url(#wl-g)" stroke="#cc8800" stroke-width="1.2"/>
  <circle cx="151" cy="9" r="4" fill="#fffde7" opacity="0.65"/>

  <!-- Ständer links -->
  <rect x="8" y="22" width="5" height="30" rx="1" fill="#555" stroke="#333" stroke-width="0.8"/>
  <rect x="2" y="48" width="18" height="4" rx="1" fill="#444"/>
  <!-- Ständer rechts -->
  <rect x="207" y="22" width="5" height="30" rx="1" fill="#555" stroke="#333" stroke-width="0.8"/>
  <rect x="200" y="48" width="18" height="4" rx="1" fill="#444"/>
  <!-- Schrankenbalken -->
  <rect x="6" y="22" width="208" height="22" fill="url(#rw-sl)" clip-path="url(#schl-clip)"/>
  <rect x="6" y="22" width="208" height="22" rx="2" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="7" y="23" width="206" height="3" rx="1" fill="rgba(255,255,255,0.35)" clip-path="url(#schl-clip)"/>
</svg>
