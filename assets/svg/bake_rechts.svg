<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 120">
  <!-- Fuß -->
  <rect x="8" y="108" width="24" height="8" rx="2" fill="#555" stroke="#333" stroke-width="1"/>
  <rect x="14" y="100" width="12" height="10" rx="1" fill="#666"/>
  <!-- Baken-Körper mit korrekten diagonalen Streifen (links nach rechts = rot-weiß) -->
  <rect x="5" y="2" width="30" height="100" rx="3" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <defs>
    <clipPath id="bk-r"><rect x="5" y="2" width="30" height="100" rx="3"/></clipPath>
    <!-- Streifen: 45° diagonal, rot-weiß, je ~18px hoch -->
    <pattern id="stripe-r" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect x="0" y="0" width="18" height="36" fill="#d32f2f"/>
      <rect x="18" y="0" width="18" height="36" fill="#ffffff"/>
    </pattern>
  </defs>
  <rect x="5" y="2" width="30" height="100" fill="url(#stripe-r)" clip-path="url(#bk-r)"/>
  <!-- Rand -->
  <rect x="5" y="2" width="30" height="100" rx="3" fill="none" stroke="#222" stroke-width="1.5"/>
  <!-- Reflektor-Streifen (weiß glänzend, oben) -->
  <rect x="6" y="6" width="28" height="4" rx="1" fill="rgba(255,255,255,0.6)" clip-path="url(#bk-r)"/>
</svg>
