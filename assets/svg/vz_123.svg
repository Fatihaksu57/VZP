<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dreieck mit rotem Rand, weiß gefüllt -->
  <polygon points="50,6 4,90 96,90"
    fill="#fff" stroke="#d32f2f" stroke-width="7" stroke-linejoin="round"/>
  <!-- Gelber Warnstreifen oben innen -->
  <polygon points="50,18 14,84 86,84"
    fill="none" stroke="none"/>
  <!-- Bauarbeiter-Piktogramm -->
  <!-- Helm -->
  <ellipse cx="50" cy="33" rx="10" ry="6" fill="#e65100"/>
  <rect x="40" y="36" width="20" height="3" rx="1" fill="#e65100"/>
  <!-- Kopf -->
  <circle cx="50" cy="41" r="6" fill="#333"/>
  <!-- Körper -->
  <line x1="50" y1="47" x2="50" y2="65" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Arme -->
  <line x1="50" y1="52" x2="38" y2="60" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="63" y2="56" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Beine -->
  <line x1="50" y1="65" x2="42" y2="80" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="65" x2="58" y2="80" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Schaufel -->
  <line x1="61" y1="48" x2="69" y2="72" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="70" cy="74" rx="6" ry="4" fill="#555" transform="rotate(-20 70 74)"/>
</svg>
