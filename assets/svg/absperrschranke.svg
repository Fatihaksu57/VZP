<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 24">
  <!-- Absperrschrankengitter — horizontal, rot-weiß diagonal -->
  <defs>
    <pattern id="rw" width="20" height="24" patternUnits="userSpaceOnUse" patternTransform="skewX(-30)">
      <rect width="10" height="24" fill="#d32f2f"/>
      <rect x="10" width="10" height="24" fill="#fff"/>
    </pattern>
  </defs>
  <!-- Main barrier bar -->
  <rect x="1" y="2" width="198" height="20" rx="2" fill="url(#rw)" stroke="#333" stroke-width="1.5"/>
  <!-- End caps -->
  <rect x="0" y="0" width="6" height="24" rx="1" fill="#666"/>
  <rect x="194" y="0" width="6" height="24" rx="1" fill="#666"/>
</svg>
